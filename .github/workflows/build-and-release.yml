name: Build and Release macOS App

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-release:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Compute version
        id: version
        shell: bash
        run: |
          VERSION=$((GITHUB_RUN_NUMBER - 1))
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build release binary
        shell: bash
        run: |
          cd macos/BZPlayer
          BUILD_DIR=$(swift build -c release --show-bin-path)
          echo "BZPLAYER_BUILD_DIR=${BUILD_DIR}" >> "$GITHUB_ENV"

      - name: Run Swift tests
        shell: bash
        run: swift test --package-path macos/BZPlayer

      - name: Create .app bundle
        shell: bash
        run: |
          zsh scripts/build_macos_app.sh \
            "dist/BZPlayer.app" \
            "${{ steps.version.outputs.version }}" \
            "${BZPLAYER_BUILD_DIR}"

      - name: Sign and notarize when credentials are configured
        shell: bash
        env:
          MACOS_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          if [[ -z "${MACOS_CERTIFICATE_BASE64}" || -z "${MACOS_CERTIFICATE_PASSWORD}" || -z "${MACOS_SIGNING_IDENTITY}" ]]; then
            echo "Signing secrets are not configured; keeping the app unsigned."
            exit 0
          fi

          set -euo pipefail
          KEYCHAIN_PATH="${RUNNER_TEMP}/bzplayer-signing.keychain-db"
          CERTIFICATE_PATH="${RUNNER_TEMP}/bzplayer-signing.p12"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 20)"
          printf '%s' "${MACOS_CERTIFICATE_BASE64}" | base64 --decode > "${CERTIFICATE_PATH}"

          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security import "${CERTIFICATE_PATH}" -P "${MACOS_CERTIFICATE_PASSWORD}" -A -t cert -f pkcs12 -k "${KEYCHAIN_PATH}"
          security list-keychains -d user -s "${KEYCHAIN_PATH}"
          security default-keychain -s "${KEYCHAIN_PATH}"
          security set-key-partition-list -S apple-tool:,apple: -s -k "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"

          codesign --deep --force --options runtime --timestamp \
            --sign "${MACOS_SIGNING_IDENTITY}" "dist/BZPlayer.app"
          codesign --verify --deep --strict "dist/BZPlayer.app"

          if [[ -n "${APPLE_API_KEY_BASE64}" && -n "${APPLE_API_KEY_ID}" && -n "${APPLE_API_ISSUER}" ]]; then
            API_KEY_PATH="${RUNNER_TEMP}/bzplayer-api-key.p8"
            printf '%s' "${APPLE_API_KEY_BASE64}" | base64 --decode > "${API_KEY_PATH}"
            xcrun notarytool submit "dist/BZPlayer.app" \
              --key "${API_KEY_PATH}" \
              --key-id "${APPLE_API_KEY_ID}" \
              --issuer "${APPLE_API_ISSUER}" \
              --wait
            xcrun stapler staple "dist/BZPlayer.app"
          else
            echo "App signing succeeded; notarization secrets are not configured."
          fi

          security delete-keychain "${KEYCHAIN_PATH}"

      - name: Build DMG
        shell: bash
        run: |
          mkdir -p release
          DMG_STAGING="dist/dmg"
          rm -rf "${DMG_STAGING}"
          mkdir -p "${DMG_STAGING}"
          cp -R "dist/BZPlayer.app" "${DMG_STAGING}/BZPlayer.app"
          ln -s /Applications "${DMG_STAGING}/Applications"

          hdiutil create \
            -volname "BZPlayer" \
            -srcfolder "${DMG_STAGING}" \
            -ov \
            -format UDZO \
            "release/BZPlayer-${{ steps.version.outputs.tag }}.dmg"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v6
        with:
          name: bzplayer-${{ steps.version.outputs.tag }}
          path: |
            dist/BZPlayer.app
            release/BZPlayer-${{ steps.version.outputs.tag }}.dmg

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2.3.3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: BZPlayer ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            release/BZPlayer-${{ steps.version.outputs.tag }}.dmg
